<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>3D Octahedron - Visible Edges</title>
    <style>
        body { margin: 0; overflow: hidden; background: white; }
        .info {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(255,255,255,0.9);
            padding: 6px 12px;
            border-radius: 8px;
            font-family: Arial, sans-serif;
            font-size: 13px;
            pointer-events: none;
            box-shadow: 0 1px 4px rgba(0,0,0,0.1);
            color: #222;
        }
    </style>
</head>
<body>
    <div class="info">🖱️ Drag to rotate | Right-click + drag to pan | Scroll to zoom</div>

    <!-- Import Three.js core and add-ons (OrbitControls) -->
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.128.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.128.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        // ------------------- 1. DEFINE VERTICES (points) -------------------
        // An octahedron has 6 vertices at (±1,0,0), (0,±1,0), (0,0,±1)
        const vertices = [
            [-1,  0,  0],  // 0: left
            [ 1,  0,  0],  // 1: right
            [ 0, -1,  0],  // 2: bottom
            [ 0,  1,  0],  // 3: top
            [ 0,  0, -1],  // 4: front
            [ 0,  0,  1]   // 5: back
        ];

        // ------------------- 2. DEFINE FACES (triangles) -------------------
        // Each face is an array of 3 vertex indices (counter-clockwise when viewed from outside)
        const faces = [
            [0, 4, 2],  // left-bottom-front
            [0, 2, 5],  // left-bottom-back
            [0, 5, 3],  // left-top-back
            [0, 3, 4],  // left-top-front
            [1, 2, 4],  // right-bottom-front
            [1, 5, 2],  // right-bottom-back
            [1, 3, 5],  // right-top-back
            [1, 4, 3]   // right-top-front
        ];

        // ------------------- 3. CREATE GEOMETRY FROM POINTS AND FACES -------------------
        const geometry = new THREE.BufferGeometry();

        // Convert vertices array to flat array of coordinates [x,y,z, x,y,z, ...]
        const positions = [];
        vertices.forEach(v => {
            positions.push(v[0], v[1], v[2]);
        });
        geometry.setAttribute('position', new THREE.BufferAttribute(new Float32Array(positions), 3));

        // Set triangle indices (faces)
        const indices = [];
        faces.forEach(face => {
            indices.push(face[0], face[1], face[2]);
        });
        geometry.setIndex(indices);

        // Compute normals for proper lighting
        geometry.computeVertexNormals();

        // ------------------- 4. MATERIAL FOR FACES (semi-transparent to show edges) -------------------
        const material = new THREE.MeshStandardMaterial({
            color: 0x4c9aff,      // pleasant blue
            roughness: 0.4,
            metalness: 0.1,
            transparent: true,
            opacity: 0.65,        // makes edges clearly visible behind faces
            side: THREE.DoubleSide // helps when rotating to see internal edges
        });

        const octahedron = new THREE.Mesh(geometry, material);

        // ------------------- 5. HIGHLIGHT EDGES (black lines) -------------------
        // EdgesGeometry extracts all sharp edges from the geometry
        const edgesGeo = new THREE.EdgesGeometry(geometry);
        const edgesMat = new THREE.LineBasicMaterial({ color: 0x000000 }); // black edges
        const wireframe = new THREE.LineSegments(edgesGeo, edgesMat);
        octahedron.add(wireframe); // attach edges to the octahedron

        // ------------------- 6. SCENE (white background) -------------------
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0xffffff); // white background

        // ------------------- 7. CAMERA -------------------
        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(2.5, 2, 3);
        camera.lookAt(0, 0, 0);

        // ------------------- 8. RENDERER -------------------
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        document.body.appendChild(renderer.domElement);

        // ------------------- 9. MOUSE CONTROLS (OrbitControls) -------------------
        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;       // smooth inertia
        controls.dampingFactor = 0.05;
        controls.rotateSpeed = 1.0;
        controls.zoomSpeed = 1.2;
        controls.panSpeed = 0.8;
        controls.enableZoom = true;
        controls.enablePan = true;
        controls.target.set(0, 0, 0);

        // ------------------- 10. BASIC LIGHTING (so faces are visible) -------------------
        // Ambient light for base illumination
        const ambientLight = new THREE.AmbientLight(0x404060, 0.6);
        scene.add(ambientLight);
        
        // Directional light (main light source)
        const directionalLight = new THREE.DirectionalLight(0xffffff, 1);
        directionalLight.position.set(2, 3, 4);
        scene.add(directionalLight);
        
        // Fill light from the back to avoid dark shadows
        const backLight = new THREE.DirectionalLight(0xccccff, 0.4);
        backLight.position.set(-1, 1, -2);
        scene.add(backLight);

        // ------------------- 11. ADD OCTAHEDRON TO SCENE -------------------
        scene.add(octahedron);

        // ------------------- 12. ANIMATION LOOP -------------------
        function animate() {
            requestAnimationFrame(animate);
            controls.update();    // update controls (user interaction)
            renderer.render(scene, camera);
        }
        animate();

        // ------------------- 13. HANDLE WINDOW RESIZE -------------------
        window.addEventListener('resize', onWindowResize, false);
        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        console.log('Octahedron loaded. Vertices:', vertices.length, 'Faces:', faces.length);
    </script>
</body>
</html>
