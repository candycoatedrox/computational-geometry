<h2><a href="../../../log.html">Log</a></h2>

	<script>
		// VARIABLES: GLOBAL TO THE APP
		var points = [[200,200],[100,200],[200,100]];
		var dragging = -1;
	
		// to be computed 
		var delaunay; 
		var voronoi;
		var triangles;
		var circles;
	
	</script>

	<!-- Set up canvas with mouse listeners -->
	<canvas id="canvasDel" width="400" height="400" style="border:1px solid #aaa"></canvas>
	<canvas id="canvasVor" width="400" height="400" style="border:1px solid #aaa"></canvas>
	<script>
		const canvasDel=document.getElementById("canvasDel");	
		const canvasVor=document.getElementById("canvasVor");	
	
		const twoCanvases=[canvasDel,canvasVor];
		
		addMouseListenersToTwoCanvases(twoCanvases);
	
	</script>
	
	<script>
		// COMPUTE DATA for drawing	
		[delaunay,voronoi,triangles] = computeDelaunayVoronoiData(points,[canvasDel.width,canvasDel.height]);
		circles=computeCircumCircles(points,triangles);
		
		// UPDATE VIEW
		drawDelaunayDisksScene(canvasDel,points,triangles,circles);
		// drawVoronoiScene(canvasVor,points,voronoi);
		drawVoronoiDisksScene(canvasVor,points,voronoi,circles);
