<!-- SET UP: WINDOW LISTENER ACTIONS: LOAD, RESIZE -->
<div>
	<script>	
		window.addEventListener('load', () => {
			const savedTheme = localStorage.getItem('theme');
			const button = document.querySelector('.theme-toggle span:last-child');
			if (savedTheme === 'light') {
				document.body.classList.add('light-theme');
				document.getElementById('theme-icon').textContent = '🌙';
				if (button) button.textContent = 'Dark Mode';
			};
			setColors();
			redrawActiveApp();
		});	
		window.addEventListener('resize', () => {
			redrawActiveApp();
		});
	</script>
</div>

<!-- Navigation app - tabs  -->
<nav> 
	<button class="active" data-tab="graphEditorApp">Graph</button>
</nav>
<!-- Associate actions to all Navigation tabs -->
<div> 
	<script>
		document.querySelectorAll('nav button').forEach(btn => {
			// add click event listener to each navigation button btn
		
			btn.addEventListener('click', () => {
			
				// deactivate all navigation buttons and demo-containers
				document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
				document.querySelectorAll('.demo-container').forEach(d => d.classList.remove('active'));
				
				// activate all classes of currently clicked btn and all elements with id's starting with tab-
				btn.classList.add('active');
				document.getElementById('tab-' + btn.dataset.tab).classList.add('active');
				
				// setColors();
				redrawActiveApp();
			});
		});
		
	</script>
</div>


<!-- >═══════════════════════════════════════════════════
     TAB 1 — GRAPH EDITOR APP
═══════════════════════════════════════════════════ -->
<div class="demo-container active" id="tab-graphEditorApp">
	<div class="canvas-wrap">
		<canvas id="canvas-graphEditorApp" width="300" height="300"></canvas>
		<div class="canvas-hint">
			Visualize and edit a graph
		</div>
	</div>
	<div class="side-panel">
		<div class="panel-section">
			<h3>SHOW</h3>
			<label><input type="checkbox" id="showBox-graphEditorApp" checked> Box</label>
			<label><input type="checkbox" id="showOrigin-graphEditorApp" checked> Origin</label>
			<label><input type="checkbox" id="showAxes-graphEditorApp" checked> Axes</label>
			<label><input type="checkbox" id="showGrid-graphEditorApp" checked> Grid</label>
			<br>
			<label><input type="checkbox" id="showVertices-graphEditorApp" checked> Vertices</label>
			<label><input type="checkbox" id="showEdges-graphEditorApp" checked> Edges</label>
		</div>
		<div class="panel-section">
			<h3>MODE</h3>
			<label><input type="radio" id="modeVertex-graphEditorApp" name="mode-graphEditorApp" value="vertex" checked> Edit Vertices</label>
			<label><input type="radio" id="modeEdge-graphEditorApp" name="mode-graphEditorApp" value="edge"> Edit Edges</label>
			<br>
			<label><input type="radio" id="modeView-graphEditorApp" name="mode-graphEditorApp" value="view"> View</label>
		</div>
		<div class="panel-section">
			<h3>Coordinates</h3>
			<div class="graphEditorApp-list" id="graphEditorApp-points">
			</div>
		</div>
		<div class="panel-section">
			<h3>EXAMPLES</h3>
			<div class="ctrl-row">
				<button class="pill" id="buttonA-graphEditorApp">Example A</button>
				<button class="pill" id="buttonB-graphEditorApp">Example B</button>
			</div>
			<div class="ctrl-row">
				<button class="pill" id="buttonRandomVertex-graphEditorApp">Add Random Vertex</button>
				<button class="pill" id="buttonRandomEdge-graphEditorApp">Add Random Edge</button>
				<button class="pill" id="buttonGenerate-graphEditorApp">Generate Random</button>
				<select id="nVertices-graphEditorApp" name="nVertices-graphEditorApp">
					<option value="3">3</option>
					<option value="4">4</option>
					<option value="5" selected>5</option>
					<option value="6">6</option>
					<option value="7">7</option>
					<option value="8">8</option>
					<option value="9">9</option>
					<option value="10">10</option>
					<option value="15">15</option>
					<option value="20">20</option>
				</select>
				<label><input type="checkbox" id="genEdges-graphEditorApp" checked> Generate Edges</label>
			</div>
			<br>
			<div class="ctrl-row">
				<button class="pill danger" id="buttonClear-graphEditorApp">Clear Graph</button>
				<button class="pill danger" id="buttonReset-graphEditorApp">Reset</button>
			</div>
		</div>
	</div>
</div>
