<!-- SET UP: WINDOW LISTENER ACTIONS: LOAD, RESIZE -->
<div>
	<script>	
		window.addEventListener('load', () => {
			const savedTheme = localStorage.getItem('theme');
			const button = document.querySelector('.theme-toggle span:last-child');
			if (savedTheme === 'light') {
				document.body.classList.add('light-theme');
				document.getElementById('theme-icon').textContent = '🌙';
				if (button) button.textContent = 'Dark Mode';
			};
			setColors();
			redrawActiveApp();
		});	
		window.addEventListener('resize', () => {
			redrawActiveApp();
		});
	</script>
</div>

<!-- ═══════════════════════════════════════════════════===
	HEADER: TITLE, LINKS TO GROUPED-APPS and THEME TOGGLE
═══════════════════════════════════════════════════=== -->
<header>
  <div style="flex: 1;">
    <h1><a href=../../index.html>Computational Geometry</a></h1>

		<span class="badge"><a href=proximity.html>PROXIMITY</a></span>
    </div>
  </div>
  <button class="theme-toggle" onclick="toggleTheme()">
    <span id="theme-icon">☀️</span>
    <span>Light Mode</span>
  </button>
</header>

<!-- Navigation app - tabs  -->
<nav> 
	<button class="active" data-tab="delaunayApp">Delaunay</button>
	<button data-tab="voronoiApp">Voronoi</button>
</nav>
<!-- Associate actions to all Navigation tabs -->
<div> 
	<script>
		document.querySelectorAll('nav button').forEach(btn => {
			// add click event listener to each navigation button btn
		
			btn.addEventListener('click', () => {
			
				// deactivate all navigation buttons and demo-containers
				document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
				document.querySelectorAll('.demo-container').forEach(d => d.classList.remove('active'));
				
				// activate all classes of currently clicked btn and all elements with id's starting with tab-
				btn.classList.add('active');
				document.getElementById('tab-' + btn.dataset.tab).classList.add('active');
				
				// setColors();
				redrawActiveApp();
			});
		});
		
	</script>
</div>


<!-- >═══════════════════════════════════════════════════
     TAB 1 — DELAUNAY APP
═══════════════════════════════════════════════════ -->
<div class="demo-container active" id="tab-delaunayApp">
	<div class="canvas-wrap">
		<canvas id="canvas-delaunayApp" width="300" height="300"></canvas>
		<div class="canvas-hint">
			Visualize the Delaunay triangulation of a graph
		</div>
	</div>
	<div class="side-panel">
		<div class="panel-section">
			<h3>SHOW</h3>
			<label><input type="checkbox" id="showBox-delaunayApp" checked> Box</label>
			<label><input type="checkbox" id="showOrigin-delaunayApp" checked> Origin</label>
			<label><input type="checkbox" id="showAxes-delaunayApp" checked> Axes</label>
			<label><input type="checkbox" id="showGrid-delaunayApp" checked> Grid</label>
			<br>
			<label><input type="checkbox" id="showVertices-delaunayApp" checked> Vertices</label>
			<label><input type="checkbox" id="showEdges-delaunayApp" checked> Edges</label>
		</div>
		<div class="panel-section">
			<h3>Coordinates</h3>
			<div class="delaunayApp-list" id="delaunayApp-points">
			</div>
		</div>
		<div class="panel-section">
			<!-- edges & faces -->
			<div class="column">
				<h3>EDGES</h3>
				<div class="delaunayApp-list" id="delaunayApp-edges">
				</div>
			</div>
		</div>
		<div class="panel-section">
			<h3>EXAMPLES</h3>
			<div class="error-display" id="delaunayApp-errors">
			</div>
			<div class="ctrl-row">
				<button class="pill" id="buttonA-delaunayApp">Example A</button>
				<button class="pill" id="buttonB-delaunayApp">Example B</button>
			</div>
			<div class="ctrl-row">
				<button class="pill" id="buttonRandomVertex-delaunayApp">Add Random Vertex</button>
				<button class="pill" id="buttonGenerate-delaunayApp">Generate Random</button>
				<select id="nVertices-delaunayApp" name="nVertices-delaunayApp">
					<option value="3">3</option>
					<option value="4">4</option>
					<option value="5" selected>5</option>
					<option value="6">6</option>
					<option value="7">7</option>
					<option value="8">8</option>
					<option value="9">9</option>
					<option value="10">10</option>
					<option value="15">15</option>
					<option value="20">20</option>
				</select>
			</div>
			<br>
			<div class="ctrl-row">
				<button class="pill danger" id="buttonReset-delaunayApp">Reset</button>
			</div>
		</div>
	</div>
</div>
