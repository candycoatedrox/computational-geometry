<!-- SET UP: WINDOW LISTENER ACTIONS: LOAD, RESIZE -->
<div>
	<script>	
		window.addEventListener('load', () => {
			const savedTheme = localStorage.getItem('theme');
			const button = document.querySelector('.theme-toggle span:last-child');
			if (savedTheme === 'light') {
				document.body.classList.add('light-theme');
				document.getElementById('theme-icon').textContent = '🌙';
				if (button) button.textContent = 'Dark Mode';
			};
			setColors();
			redrawActiveApp();
		});	
		window.addEventListener('resize', () => {
			redrawActiveApp();
		});
	</script>
</div>

<!-- Navigation app - tabs  -->
<nav> 
	<button class="active" data-tab="polygonSubdivisionApp">Polygon Subdivision</button>
</nav>
<!-- Associate actions to all Navigation tabs -->
<div> 
	<script>
		document.querySelectorAll('nav button').forEach(btn => {
			// add click event listener to each navigation button btn
		
			btn.addEventListener('click', () => {
			
				// deactivate all navigation buttons and demo-containers
				document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
				document.querySelectorAll('.demo-container').forEach(d => d.classList.remove('active'));
				
				// activate all classes of currently clicked btn and all elements with id's starting with tab-
				btn.classList.add('active');
				document.getElementById('tab-' + btn.dataset.tab).classList.add('active');
				
				// setColors();
				redrawActiveApp();
			});
		});
		
	</script>
</div>


<!-- >═══════════════════════════════════════════════════
     TAB 1 — POLYGON SUBDIVISION APP
═══════════════════════════════════════════════════ -->
<div class="demo-container active" id="tab-polygonSubdivisionApp">
	<div class="canvas-wrap">
		<canvas id="canvas-polygonSubdivisionApp" width="300" height="300"></canvas>
		<div class="canvas-hint">
			Visualize and edit the subdivision of a polygon as a planar graph
		</div>
	</div>
	<div class="side-panel">
		<div class="panel-section">
			<h3>SHOW</h3>
			<label><input type="checkbox" id="showBox-polygonSubdivisionApp" checked> Box</label>
			<label><input type="checkbox" id="showOrigin-polygonSubdivisionApp" checked> Origin</label>
			<label><input type="checkbox" id="showAxes-polygonSubdivisionApp" checked> Axes</label>
			<label><input type="checkbox" id="showGrid-polygonSubdivisionApp" checked> Grid</label>
			<br>
			<label><input type="checkbox" id="showPolygon-polygonSubdivisionApp" checked> Polygon Vertices</label>
			<label><input type="checkbox" id="showIntersections-polygonSubdivisionApp" checked> Intersections</label>
			<br>
			<label><input type="checkbox" id="showEdges-polygonSubdivisionApp" checked> Edges</label>
			<br>
			<label><input type="checkbox" id="showTEST-polygonSubdivisionApp"> True Polygon Vertices (TEST)</label>
			<details>
				<summary><label><input type="checkbox" id="showFaces-polygonSubdivisionApp" checked> Faces</label></summary>
				<div id="showFacesMenu-polygonSubdivisionApp">
				</div>
			</details>
		</div>
		<div class="panel-section">
			<h3>FACE COLORS</h3>
			<label><input type="radio" id="colorMulti-polygonSubdivisionApp" name="color-polygonSubdivisionApp" checked> Multicolor</label>
			<label><input type="radio" id="colorSingle-polygonSubdivisionApp" name="color-polygonSubdivisionApp"> Single Color</label>
		</div>
		<div class="panel-section">
			<h3>Coordinates</h3>
			<div class="polygonSubdivisionApp-list" id="polygonSubdivisionApp-points">
			</div>
		</div>
		<div class="panel-section">
			<!-- edges & faces -->
			<div class="column">
				<h3>EDGES</h3>
				<div class="polygonSubdivisionApp-list" id="polygonSubdivisionApp-edges">
				</div>
			</div>
			<div class="column">
				<h3>FACES</h3>
				<div class="polygonSubdivisionApp-list" id="polygonSubdivisionApp-faces">
				</div>
			</div>
		</div>
		<div class="panel-section">
			<h3>EXAMPLES</h3>
			<div class="error-display" id="polygonSubdivisionApp-errors">
			</div>
			<div class="ctrl-row">
				<button class="pill" id="buttonA-polygonSubdivisionApp">Example A</button>
				<button class="pill" id="buttonB-polygonSubdivisionApp">Example B</button>
			</div>
			<div class="ctrl-row">
				<button class="pill" id="buttonRandomVertex-polygonSubdivisionApp">Add Random Vertex</button>
				<button class="pill" id="buttonGenerate-polygonSubdivisionApp">Generate Random</button>
				<select id="nVertices-polygonSubdivisionApp" name="nVertices-polygonSubdivisionApp">
					<option value="3">3</option>
					<option value="4">4</option>
					<option value="5" selected>5</option>
					<option value="6">6</option>
					<option value="7">7</option>
					<option value="8">8</option>
					<option value="9">9</option>
					<option value="10">10</option>
					<option value="15">15</option>
					<option value="20">20</option>
				</select>
			</div>
			<br>
			<div class="ctrl-row">
				<button class="pill danger" id="buttonClear-polygonSubdivisionApp">Clear Graph</button>
				<button class="pill danger" id="buttonReset-polygonSubdivisionApp">Reset</button>
			</div>
		</div>
	</div>
</div>
