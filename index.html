<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Computational Geometry: Interactive Demos </title>
<link rel="stylesheet" href="css/style4.css">
</head>

<body>
<!-- ═══════════════════════════════════════════════════===
	MAIN PAGE TITLE, LINKS TO GROUPED-APPS and THEME TOGGLE
═══════════════════════════════════════════════════=== -->
<header>
	<div style="flex: 1;">
		<h1><a href=index.html>Computational Geometry</a></h1>
		<p style="margin-top:8px">Interactive Demos</p>
		<div style="margin-top:10px">
			<span class="badge"><a href=Apps/RefFrame/refFrame.html>Ref Frame</a></span>
			<span class="badge"><a href=Apps/Basics/basics.html>Basics</a></span>
			<span class="badge"><a href=Apps/Triangle/triangle.html>Triangle</a></span>
			<span class="badge"><a href=Apps/Polygon/polygon.html>Polygon</a></span>
		</div>
	</div>
	<div>
		<script>
			function toggleTheme() {
				const body = document.body;
				const icon = document.getElementById('theme-icon');
				const button = document.querySelector('.theme-toggle span:last-child');
  
				if (body.classList.contains('light-theme')) {
					body.classList.remove('light-theme');
					icon.textContent = '☀️';
					button.textContent = 'Light Mode';
					localStorage.setItem('theme', 'dark');
				} else {
					body.classList.add('light-theme');
					icon.textContent = '🌙';
					button.textContent = 'Dark Mode';
					localStorage.setItem('theme', 'light');
				}
			}
		</script>

		<button class="theme-toggle" onclick="toggleTheme()">
			<span id="theme-icon">☀️</span>
			<span>Light Mode</span>
		</button>  
	</div>
</header>

<!-- ═══════════════════════════════════════════════════===
     MAIN PAGE IMAGE or POSSIBLE DEMO - Currently a STUB 
═══════════════════════════════════════════════════=== -->
<div class="demo-container active" id="tab-xx">
	<div class="canvas-wrap">
		<canvas id="canvas-xx" width="300" height="300"></canvas>
		<div class="canvas-hint">
			Choose from the menu to explore each collection.
		</div>
	</div>
</div>

<!-- ....................................................
     WINDOW: EVENT LISTENERS
..................................................... -->
<div>
	<script>	
		window.addEventListener('load', () => {
			// localStorage.removeItem('theme');
			// localStorage.setItem('theme', 'dark');
			const savedTheme = localStorage.getItem('theme');
			const button = document.querySelector('.theme-toggle span:last-child');
			if (savedTheme === 'light') {
				document.body.classList.add('light-theme');
				document.getElementById('theme-icon').textContent = '🌙';
				if (button) button.textContent = 'Dark Mode';
			}
		});		
	</script>
</div>
	
</body>
</html>
